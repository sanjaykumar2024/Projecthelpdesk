<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tickets | Helpdesk</title>
    <meta name="description" content="View and manage your helpdesk tickets">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="page-loader">
        <div class="loader-spinner"></div>
    </div>
    <!-- TOP NAVIGATION -->
    <nav class="top-nav">
        <div class="nav-container">
            <a href="/dashboard" class="nav-logo">🎫 HelpDesk</a>

            <div class="nav-links">
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/tickets" class="nav-link">My Tickets</a>
                <a href="/create-ticket" class="nav-link">New Ticket</a>
                <a href="/all-tickets" class="nav-link active" data-role="ADMIN" style="display:none">All Tickets</a>
                <a href="/manage-agents" class="nav-link" data-role="ADMIN" style="display:none">Manage Agents</a>
            </div>

            <div class="nav-actions">
                <button class="theme-toggle" onclick="ThemeManager.toggle()" title="Toggle dark mode"></button>
                <div class="nav-user">
                    <div class="nav-avatar">U</div>
                    <button onclick="Auth.logout()" class="btn btn-sm btn-outline"
                        style="border:none;color:var(--text-muted)">Log Out</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="app-layout" style="display:block">
        <main class="main-content" style="margin-left:0;padding-top:20px;max-width:1200px;margin:0 auto">
            <div class="mb-3 d-flex justify-between items-center">
                <h1>🎫 Tickets</h1>
                <a href="/create-ticket" class="btn btn-primary">➕ New Ticket</a>
            </div>

            <!-- Filters -->
            <div class="filter-bar">
                <select class="form-control" id="filterStatus">
                    <option value="">All Status</option>
                    <option value="OPEN">Open</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="ON_HOLD">On Hold</option>
                    <option value="RESOLVED">Resolved</option>
                    <option value="CLOSED">Closed</option>
                </select>
                <select class="form-control" id="filterPriority">
                    <option value="">All Priority</option>
                    <option value="LOW">Low</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="HIGH">High</option>
                    <option value="URGENT">Urgent</option>
                </select>
                <select class="form-control" id="filterDepartment">
                    <option value="">All Departments</option>
                </select>
                <input type="date" class="form-control" id="filterStartDate" placeholder="Start Date">
                <input type="date" class="form-control" id="filterEndDate" placeholder="End Date">
                <button class="btn btn-primary btn-sm" onclick="applyFilters()">🔍 Filter</button>
                <button class="btn btn-outline btn-sm" onclick="clearFilters()">✕ Clear</button>
            </div>

            <!-- Tickets Grid -->
            <div class="tickets-grid" id="ticketsGrid">
                <div class="loader">
                    <div class="loader-spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/chatbot.js"></script>
    <script>
        if (!Auth.requireAuth()) throw new Error('Not authenticated');

        let allTickets = [];

        async function loadTickets() {
            try {
                if (Auth.getRole() === 'ADMIN') {
                    allTickets = await API.get('/tickets/all');
                    renderTickets(allTickets);
                } else {
                    window.location.href = '/tickets'; // Redirect non-admins
                }
            } catch (error) {
                Toast.error('Failed to load tickets');
            }
        }

        async function loadDepartments() {
            try {
                const depts = await API.get('/departments');
                const select = document.getElementById('filterDepartment');
                depts.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = d.name;
                    select.appendChild(opt);
                });
            } catch (e) { }
        }

        function renderTickets(tickets) {
            const grid = document.getElementById('ticketsGrid');
            if (!tickets.length) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📭</div><h3>No tickets found</h3><p>Try adjusting your filters or create a new ticket</p></div>';
                return;
            }
            grid.innerHTML = tickets.map((t, i) => `
                <div class="ticket-card" data-status="${t.status}" style="animation-delay:${i * 0.08}s"
                     onclick="window.location.href='/ticket-detail?id=${t.id}'">
                    <div class="ticket-header">
                        <span class="ticket-id">#${t.id}</span>
                        ${getStatusBadge(t.status)}
                    </div>
                    <div class="ticket-title">${t.title}</div>
                    <div class="ticket-desc">${t.description}</div>
                    <div class="ticket-meta">
                        <span>${getPriorityBadge(t.priority)}</span>
                        <span>🏢 ${t.departmentName}</span>
                    </div>
                    <div class="ticket-meta mt-1">
                        <span>👤 ${t.creatorName}</span>
                        <span>📅 ${formatDate(t.createdAt)}</span>
                    </div>
                    ${t.assignedAgentName ? `<div class="ticket-meta mt-1"><span>🔧 Agent: ${t.assignedAgentName}</span></div>` : ''}
                </div>
            `).join('');
        }

        async function applyFilters() {
            const status = document.getElementById('filterStatus').value;
            const priority = document.getElementById('filterPriority').value;
            const deptId = document.getElementById('filterDepartment').value;
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;

            let params = [];
            if (status) params.push(`status=${status}`);
            if (priority) params.push(`priority=${priority}`);
            if (deptId) params.push(`departmentId=${deptId}`);
            if (startDate) params.push(`startDate=${startDate}T00:00:00`);
            if (endDate) params.push(`endDate=${endDate}T23:59:59`);

            if (params.length === 0) {
                renderTickets(allTickets);
                return;
            }

            try {
                const filtered = await API.get(`/tickets/filter?${params.join('&')}`);
                renderTickets(filtered);
                Toast.info(`Found ${filtered.length} ticket(s)`);
            } catch (error) {
                Toast.error('Filter failed');
            }
        }

        function clearFilters() {
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterPriority').value = '';
            document.getElementById('filterDepartment').value = '';
            document.getElementById('filterStartDate').value = '';
            document.getElementById('filterEndDate').value = '';
            renderTickets(allTickets);
        }

        loadTickets();
        loadDepartments();
    </script>
</body>

</html>
