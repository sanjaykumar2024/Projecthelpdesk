<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Detail | Helpdesk</title>
    <meta name="description" content="View ticket details, comments, and feedback">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="page-loader">
        <div class="loader-spinner"></div>
    </div>
    <!-- TOP NAVIGATION -->
    <nav class="top-nav">
        <div class="nav-container">
            <a href="dashboard.html" class="nav-logo">🎫 HelpDesk</a>

            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="tickets.html" class="nav-link">My Tickets</a>
                <a href="create-ticket.html" class="nav-link">New Ticket</a>
                <a href="tickets.html?view=all" class="nav-link" data-role="ADMIN" style="display:none">All Tickets</a>
                <a href="dashboard.html?view=admin" class="nav-link" data-role="ADMIN" style="display:none">Manage
                    Agents</a>
            </div>

            <div class="nav-actions">
                <button class="theme-toggle" onclick="ThemeManager.toggle()" title="Toggle dark mode"></button>
                <div class="nav-user">
                    <div class="nav-avatar">U</div>
                    <button onclick="Auth.logout()" class="btn btn-sm btn-outline"
                        style="border:none;color:var(--text-muted)">Log Out</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="app-layout" style="display:block">
        <main class="main-content">
            <div class="mb-3 d-flex justify-between items-center">
                <h1 id="ticketTitle">Ticket Detail</h1>
                <a href="tickets.html" class="btn btn-outline btn-sm">← Back to Tickets</a>
            </div>

            <!-- Ticket Info -->
            <div style="display:grid;grid-template-columns:2fr 1fr;gap:24px" id="ticketLayout">
                <!-- Left Column -->
                <div>
                    <!-- Ticket Details Card -->
                    <div class="glass-card mb-3" id="ticketCard">
                        <div class="loader">
                            <div class="loader-spinner"></div>
                        </div>
                    </div>

                    <!-- Comments Section -->
                    <div class="glass-card">
                        <h3 style="margin-bottom:16px;font-weight:700">💬 Comments</h3>
                        <div id="commentsContainer">
                            <div class="loader">
                                <div class="loader-spinner"></div>
                            </div>
                        </div>
                        <div style="margin-top:20px;border-top:1px solid var(--border-color);padding-top:20px">
                            <div class="form-group">
                                <textarea class="form-control" id="commentInput" placeholder="Write a comment..."
                                    rows="3"></textarea>
                            </div>
                            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                                <button class="btn btn-primary btn-sm" onclick="submitComment()">💬 Add Comment</button>
                                <button class="btn btn-sm" id="aiBtn" onclick="generateAIComment()"
                                    style="background:linear-gradient(135deg,#8B5CF6,#EC4899);color:white;border:none;position:relative;overflow:hidden">
                                    ✨ Generate AI Comment
                                    <span id="aiShimmer"
                                        style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);display:none"></span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column - Actions & Info -->
                <div>
                    <!-- Status Actions (Admin/Agent) -->
                    <div class="glass-card mb-3" id="actionsCard" style="display:none">
                        <h3 style="margin-bottom:16px;font-weight:700">⚙️ Actions</h3>

                        <div class="form-group" id="statusGroup">
                            <label class="form-label">Update Status</label>
                            <select class="form-control" id="statusSelect">
                                <option value="OPEN">Open</option>
                                <option value="IN_PROGRESS">In Progress</option>
                                <option value="ON_HOLD">On Hold</option>
                                <option value="RESOLVED">Resolved</option>
                                <option value="CLOSED">Closed</option>
                            </select>
                            <button class="btn btn-primary btn-sm mt-1 w-100" onclick="updateStatus()">Update
                                Status</button>
                        </div>

                        <div class="form-group" id="assignGroup" style="display:none">
                            <label class="form-label">Assign Agent (User ID)</label>
                            <input type="number" class="form-control" id="agentIdInput"
                                placeholder="Enter agent user ID">
                            <button class="btn btn-success btn-sm mt-1 w-100" onclick="assignAgent()">Assign
                                Agent</button>
                        </div>
                    </div>

                    <!-- Ticket Meta Info -->
                    <div class="glass-card mb-3" id="metaCard">
                        <h3 style="margin-bottom:16px;font-weight:700">📋 Info</h3>
                        <div id="metaInfo">Loading...</div>
                    </div>

                    <!-- Feedback Section -->
                    <div class="glass-card" id="feedbackCard" style="display:none">
                        <h3 style="margin-bottom:16px;font-weight:700">⭐ Rating & Feedback</h3>
                        <div id="feedbackContent"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Feedback Modal -->
    <div class="modal-overlay" id="feedbackModal">
        <div class="modal-content">
            <h2>⭐ Rate This Ticket</h2>
            <p style="color:var(--text-secondary);margin-bottom:20px">How was your experience with this ticket?</p>
            <div class="form-group">
                <label class="form-label">Rating</label>
                <div class="star-rating" id="starRating">
                    <input type="radio" name="rating" id="star5" value="5"><label for="star5">⭐</label>
                    <input type="radio" name="rating" id="star4" value="4"><label for="star4">⭐</label>
                    <input type="radio" name="rating" id="star3" value="3"><label for="star3">⭐</label>
                    <input type="radio" name="rating" id="star2" value="2"><label for="star2">⭐</label>
                    <input type="radio" name="rating" id="star1" value="1"><label for="star1">⭐</label>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Comment (optional)</label>
                <textarea class="form-control" id="feedbackComment" placeholder="Share your feedback..."
                    rows="3"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary" onclick="submitFeedback()">Submit Feedback</button>
                <button class="btn btn-outline" onclick="closeFeedbackModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/chatbot.js"></script>
    <script>
        if (!Auth.requireAuth()) throw new Error('Not authenticated');

        const ticketId = new URLSearchParams(window.location.search).get('id');
        if (!ticketId) { window.location.href = 'tickets.html'; }

        let currentTicket = null;

        async function loadTicket() {
            try {
                currentTicket = await API.get(`/tickets/${ticketId}`);
                renderTicket(currentTicket);
                loadComments();
                checkFeedback();
                setupActions();
            } catch (error) {
                Toast.error('Failed to load ticket');
            }
        }

        function renderTicket(t) {
            document.getElementById('ticketTitle').textContent = `Ticket #${t.id}`;
            document.title = `Ticket #${t.id} | Helpdesk`;

            document.getElementById('ticketCard').innerHTML = `
                <div class="d-flex justify-between items-center mb-2">
                    <h2 style="font-weight:800;font-size:1.3rem">${t.title}</h2>
                    ${getStatusBadge(t.status)}
                </div>
                <p style="color:var(--text-secondary);line-height:1.8;margin-bottom:16px;white-space:pre-wrap">${t.description}</p>
            `;

            document.getElementById('metaInfo').innerHTML = `
                <div style="display:flex;flex-direction:column;gap:12px">
                    <div><strong style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase">Status</strong><div style="margin-top:4px">${getStatusBadge(t.status)}</div></div>
                    <div><strong style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase">Priority</strong><div style="margin-top:4px">${getPriorityBadge(t.priority)}</div></div>
                    <div><strong style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase">Department</strong><div style="margin-top:4px">🏢 ${t.departmentName}</div></div>
                    <div><strong style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase">Created By</strong><div style="margin-top:4px">👤 ${t.creatorName}</div></div>
                    <div><strong style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase">Assigned Agent</strong><div style="margin-top:4px">🔧 ${t.assignedAgentName || 'Not assigned'}</div></div>
                    <div><strong style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase">Created</strong><div style="margin-top:4px">📅 ${formatDate(t.createdAt)}</div></div>
                    <div><strong style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase">Updated</strong><div style="margin-top:4px">📅 ${formatDate(t.updatedAt)}</div></div>
                </div>
            `;

            // Show status selector
            if (document.getElementById('statusSelect')) {
                document.getElementById('statusSelect').value = t.status;
            }
        }

        function setupActions() {
            const role = Auth.getRole();
            if (role === 'ADMIN' || role === 'AGENT') {
                document.getElementById('actionsCard').style.display = 'block';
                if (role === 'ADMIN') {
                    document.getElementById('assignGroup').style.display = 'block';
                }
            }

            // Show feedback button for ticket owner when resolved/closed
            const user = Auth.getUser();
            if ((currentTicket.status === 'RESOLVED' || currentTicket.status === 'CLOSED')
                && currentTicket.creatorId === user.userId && !currentTicket.hasFeedback) {
                document.getElementById('feedbackCard').style.display = 'block';
                document.getElementById('feedbackContent').innerHTML = `
                    <p style="color:var(--text-secondary);margin-bottom:12px">Your ticket has been resolved! Please rate your experience.</p>
                    <button class="btn btn-primary w-100" onclick="openFeedbackModal()">⭐ Leave Feedback</button>
                `;
            }
        }

        async function loadComments() {
            try {
                const comments = await API.get(`/tickets/${ticketId}/comments`);
                const container = document.getElementById('commentsContainer');

                if (!comments.length) {
                    container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">No comments yet</p>';
                    return;
                }

                container.innerHTML = comments.map(c => `
                    <div class="comment-item">
                        <div class="comment-avatar">${c.authorName.charAt(0).toUpperCase()}</div>
                        <div class="comment-body">
                            <div class="comment-author">${c.authorName}</div>
                            <div class="comment-text">${c.message}</div>
                            <div class="comment-time">${formatDate(c.createdAt)}</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load comments');
            }
        }

        async function submitComment() {
            const message = document.getElementById('commentInput').value.trim();
            if (!message) { Toast.warning('Please enter a comment'); return; }

            try {
                await API.post(`/tickets/${ticketId}/comments`, { message });
                document.getElementById('commentInput').value = '';
                Toast.success('Comment added');
                loadComments();
            } catch (error) {
                Toast.error('Failed to add comment');
            }
        }

        // ===== AI COMMENT GENERATOR =====
        const aiTemplates = {
            OPEN: [
                "Thank you for submitting this ticket. We've received your request and a team member will be reviewing it shortly. In the meantime, please provide any additional details that might help us resolve this faster.",
                "Hi there! We've logged your issue and it's now in our queue. We aim to provide an initial response within 24 hours. If this is urgent, please flag the priority accordingly.",
                "Your ticket has been received and is currently open for review. Our support team will analyze the issue and get back to you with next steps."
            ],
            IN_PROGRESS: [
                "We're actively working on this issue. Our team is investigating the root cause and we'll update you as soon as we have more information.",
                "This ticket is currently being handled by our support team. We've identified the area of concern and are working on a resolution. We'll keep you posted on our progress.",
                "Update: Our team has started working on this. Initial analysis is underway. We appreciate your patience while we work towards a solution."
            ],
            ON_HOLD: [
                "This ticket has been placed on hold pending additional information. Could you please provide more details so we can continue? Specifically, we need clarification on the steps to reproduce the issue.",
                "We're temporarily pausing work on this ticket. We need some additional context from your end. Please reply with the requested details and we'll resume immediately.",
                "This request is on hold as we're awaiting a dependency to be resolved. We'll resume work as soon as the blocker is cleared and will notify you of any updates."
            ],
            RESOLVED: [
                "Great news! This issue has been resolved. The fix has been applied and should be effective immediately. Please verify on your end and let us know if everything looks good.",
                "We've successfully resolved this ticket. The solution involved addressing the reported concern directly. If you experience any further issues, feel free to reopen this ticket.",
                "This ticket has been marked as resolved. We've implemented the necessary changes to address your request. Please take a moment to confirm and provide any feedback."
            ],
            CLOSED: [
                "This ticket has been closed. Thank you for your patience throughout the resolution process. If you need further assistance, don't hesitate to open a new ticket.",
                "Ticket closed. We hope the resolution met your expectations. Your feedback helps us improve our service — consider leaving a rating if you haven't already."
            ]
        };

        const priorityPrefixes = {
            URGENT: "⚡ URGENT: ",
            HIGH: "🔴 High Priority — ",
            MEDIUM: "",
            LOW: ""
        };

        function generateAIComment() {
            if (!currentTicket) { Toast.warning('Ticket not loaded yet'); return; }

            const btn = document.getElementById('aiBtn');
            const shimmer = document.getElementById('aiShimmer');
            const textarea = document.getElementById('commentInput');

            // Show loading animation
            btn.disabled = true;
            btn.style.opacity = '0.7';
            shimmer.style.display = 'block';
            shimmer.style.animation = 'shimmer 1s ease-in-out infinite';

            // Pick a random template based on status
            const templates = aiTemplates[currentTicket.status] || aiTemplates.OPEN;
            let comment = templates[Math.floor(Math.random() * templates.length)];

            // Add priority prefix for urgent/high
            const prefix = priorityPrefixes[currentTicket.priority] || '';
            if (prefix) comment = prefix + comment;

            // Simulate typing effect
            textarea.value = '';
            let i = 0;
            const typeSpeed = 12;
            function typeChar() {
                if (i < comment.length) {
                    textarea.value += comment.charAt(i);
                    i++;
                    setTimeout(typeChar, typeSpeed);
                } else {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    shimmer.style.display = 'none';
                    Toast.success('AI comment generated! Feel free to edit before submitting.');
                }
            }
            setTimeout(typeChar, 300);
        }

        async function updateStatus() {
            const status = document.getElementById('statusSelect').value;
            try {
                await API.patch(`/tickets/${ticketId}/status?status=${status}`);
                Toast.success('Status updated to ' + status);
                loadTicket();
            } catch (error) {
                Toast.error('Failed to update status');
            }
        }

        async function assignAgent() {
            const agentId = document.getElementById('agentIdInput').value;
            if (!agentId) { Toast.warning('Enter an agent ID'); return; }

            try {
                await API.patch(`/tickets/${ticketId}/assign?agentId=${agentId}`);
                Toast.success('Agent assigned successfully');
                loadTicket();
            } catch (error) {
                Toast.error('Failed to assign agent');
            }
        }

        async function checkFeedback() {
            try {
                const fb = await API.get(`/tickets/${ticketId}/feedback`);
                if (fb) {
                    document.getElementById('feedbackCard').style.display = 'block';
                    const stars = '⭐'.repeat(fb.rating) + '☆'.repeat(5 - fb.rating);
                    document.getElementById('feedbackContent').innerHTML = `
                        <div style="font-size:1.5rem;margin-bottom:8px">${stars}</div>
                        <p style="font-weight:600">${fb.userName}</p>
                        ${fb.comment ? `<p style="color:var(--text-secondary);margin-top:8px">"${fb.comment}"</p>` : ''}
                        <p style="color:var(--text-muted);font-size:0.8rem;margin-top:8px">${formatDate(fb.createdAt)}</p>
                    `;
                }
            } catch (e) {
                // No feedback yet — that's fine
            }
        }

        function openFeedbackModal() {
            document.getElementById('feedbackModal').classList.add('open');
        }

        function closeFeedbackModal() {
            document.getElementById('feedbackModal').classList.remove('open');
        }

        async function submitFeedback() {
            const ratingInput = document.querySelector('input[name="rating"]:checked');
            if (!ratingInput) { Toast.warning('Please select a rating'); return; }

            const rating = parseInt(ratingInput.value);
            const comment = document.getElementById('feedbackComment').value.trim();

            try {
                await API.post(`/tickets/${ticketId}/feedback`, { rating, comment: comment || null });
                Toast.success('Thank you for your feedback!');
                closeFeedbackModal();
                loadTicket();
            } catch (error) {
                Toast.error(error.message || 'Failed to submit feedback');
            }
        }

        loadTicket();
    </script>
</body>

</html>
