<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base | Helpdesk</title>
    <meta name="description" content="Search the knowledge base for help">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .kb-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .kb-header {
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.08) 0%, rgba(6, 182, 212, 0.05) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 20px;
        }

        .kb-header h1 {
            font-size: 2.2rem;
            margin-bottom: 12px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kb-search {
            max-width: 600px;
            margin: 20px auto 0;
            display: flex;
            gap: 12px;
        }

        .kb-search input {
            flex: 1;
            padding: 14px 20px;
            font-size: 1.1rem;
            border-radius: 30px;
        }

        .kb-categories {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-chip {
            padding: 8px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .category-chip:hover, .category-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .article-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .article-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .article-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .article-excerpt {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 16px;
            flex: 1;
        }

        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
            padding-top: 12px;
        }

        /* Article Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-primary);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeInDown 0.3s ease;
        }

        .modal-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            background: rgba(var(--bg-primary-rgb), 0.9);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .modal-close {
            position: absolute;
            top: 24px; right: 32px;
            background: none; border: none;
            font-size: 1.5rem; cursor: pointer;
            color: var(--text-secondary);
        }

        .article-content-full {
            padding: 32px;
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .article-content-full h1, .article-content-full h2, .article-content-full h3 {
            margin: 24px 0 16px;
        }

        .article-content-full p {
            margin-bottom: 16px;
        }

        .vote-section {
            padding: 24px 32px;
            border-top: 1px solid var(--glass-border);
            background: var(--bg-secondary);
            text-align: center;
        }

        .vote-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 12px;
        }

        .btn-vote {
            padding: 8px 24px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-vote:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
        }
    </style>
</head>

<body>
    <div class="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- TOP NAVIGATION -->
    <nav class="top-nav">
        <div class="nav-container">
            <a href="/dashboard" class="nav-logo">🎫 HelpDesk</a>

            <div class="nav-links">
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/tickets" class="nav-link">My Tickets</a>
                <a href="/create-ticket" class="nav-link">New Ticket</a>
                <a href="/knowledge-base" class="nav-link active">📚 KB</a>
                <a href="/department-tickets" class="nav-link" data-role="AGENT" style="display:none">Dept Tickets</a>
                <a href="/all-tickets" class="nav-link" data-role="ADMIN" style="display:none">All Tickets</a>
                <a href="/manage-agents" class="nav-link" data-role="ADMIN" style="display:none">Manage</a>
                <a href="/analytics" class="nav-link" data-role="ADMIN,AGENT" style="display:none">📊 Analytics</a>
            </div>

            <div class="nav-actions">
                <button class="theme-toggle" onclick="ThemeManager.toggle()" title="Toggle dark mode"></button>
                <div class="nav-user">
                    <div class="nav-avatar">U</div>
                    <a href="/profile" style="font-size:0.8rem;color:var(--text-muted);text-decoration:none;">Profile</a>
                    <button onclick="Auth.logout()" class="btn btn-sm btn-outline"
                        style="border:none;color:var(--text-muted)">Log Out</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="app-layout" style="display:block">
        <main class="main-content kb-container">
            
            <div class="kb-header">
                <h1>📚 Knowledge Base</h1>
                <p style="color:var(--text-secondary)">Search for articles, guides, and FAQs.</p>
                
                <form class="kb-search" onsubmit="event.preventDefault(); handleSearch();">
                    <input type="text" id="searchInput" placeholder="Search articles..." class="form-control"
                           style="border:1px solid var(--primary);box-shadow:0 0 15px rgba(139,92,246,0.1)">
                    <button type="submit" class="btn btn-primary" style="border-radius:30px;padding:0 24px;">🔍 Search</button>
                </form>
            </div>

            <div class="kb-categories" id="categoriesContainer">
                <!-- Categories will load here -->
            </div>

            <div class="article-grid" id="articleList">
                <div class="loader"><div class="loader-spinner"></div></div>
            </div>

        </main>
    </div>

    <!-- Article Modal -->
    <div id="articleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="modal-close" onclick="closeModal()">&times;</button>
                <span class="article-category" id="modalCategory">Category</span>
                <h1 id="modalTitle" style="margin-top:8px;font-size:1.8rem">Article Title</h1>
                <div style="font-size:0.8rem;color:var(--text-muted);margin-top:8px">
                    <span id="modalAuthor">Author</span> • <span id="modalDate">Date</span> • <span id="modalViews">0 Views</span>
                </div>
            </div>
            <div class="article-content-full" id="modalContent">
                <!-- Content here -->
            </div>
            <div class="vote-section">
                <h3 style="font-size:1.1rem;margin-bottom:8px">Was this article helpful?</h3>
                <div class="vote-buttons">
                    <button class="btn-vote" onclick="submitVote(true)">👍 Yes (<span id="modalHelpful">0</span>)</button>
                    <button class="btn-vote" onclick="submitVote(false)">👎 No (<span id="modalNotHelpful">0</span>)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/chatbot.js"></script>
    <script>
        // Use requireAuth but don't redirect (so public users can read if allowed in future)
        let allArticles = [];
        let currentCategory = 'all';
        let currentArticleId = null;

        async function initKB() {
            try {
                // Fetch categories and articles in parallel
                const [categories, articles] = await Promise.all([
                    API.get('/knowledge/categories'),
                    API.get('/knowledge')
                ]);
                
                allArticles = articles;
                renderCategories(categories);
                renderArticles(allArticles);
            } catch (error) {
                Toast.error('Failed to load Knowledge Base');
            }
        }

        function renderCategories(categories) {
            const container = document.getElementById('categoriesContainer');
            let html = `<div class="category-chip active" onclick="filterByCategory('all', this)">All Categories</div>`;
            
            categories.forEach(c => {
                html += `<div class="category-chip" onclick="filterByCategory('${c}', this)">${c}</div>`;
            });
            
            container.innerHTML = html;
        }

        function renderArticles(articles) {
            const container = document.getElementById('articleList');
            
            if (articles.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:3rem;margin-bottom:12px">📚</div>
                        <h3 style="font-size:1.2rem;margin-bottom:8px">No articles found</h3>
                        <p style="color:var(--text-secondary)">Try adjusting your search or filter.</p>
                    </div>`;
                return;
            }

            container.innerHTML = articles.map((a, i) => `
                <div class="article-card" style="animation: fadeInDown 0.3s ease ${i * 0.05}s forwards; opacity: 0;"
                     onclick="openArticle(${a.id})">
                    <div class="article-category">${a.category || 'General'}</div>
                    <div class="article-title">${a.title}</div>
                    <div class="article-excerpt">${a.content.substring(0, 100).replace(/<[^>]*>?/gm, '')}${a.content.length > 100 ? '...' : ''}</div>
                    <div class="article-meta">
                        <span>👁️ ${a.viewCount} views</span>
                        <span>👍 ${a.helpful} helpful</span>
                    </div>
                </div>
            `).join('');
        }

        async function handleSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) {
                renderArticles(allArticles);
                return;
            }
            
            try {
                const results = await API.get(`/knowledge/search?q=${encodeURIComponent(q)}`);
                renderArticles(results);
                
                // Reset category UI
                document.querySelectorAll('.category-chip').forEach(el => el.classList.remove('active'));
            } catch (error) {
                Toast.error('Search failed');
            }
        }

        window.filterByCategory = function(category, element) {
            document.querySelectorAll('.category-chip').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            if (category === 'all') {
                renderArticles(allArticles);
            } else {
                const filtered = allArticles.filter(a => a.category === category);
                renderArticles(filtered);
            }
        }

        window.openArticle = async function(id) {
            try {
                const a = await API.get(`/knowledge/${id}`);
                currentArticleId = id;
                
                document.getElementById('modalCategory').textContent = a.category || 'General';
                document.getElementById('modalTitle').textContent = a.title;
                document.getElementById('modalAuthor').textContent = `By ${a.authorName}`;
                document.getElementById('modalDate').textContent = new Date(a.createdAt).toLocaleDateString('en-US');
                document.getElementById('modalViews').textContent = `${a.viewCount} Views`;
                document.getElementById('modalHelpful').textContent = a.helpful;
                document.getElementById('modalNotHelpful').textContent = a.notHelpful;
                
                // Allow simple HTML parsing for formatting (in real app, use markdown parser)
                const formattedContent = a.content.replace(/\n/g, '<br>');
                document.getElementById('modalContent').innerHTML = formattedContent;
                
                const modal = document.getElementById('articleModal');
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            } catch (error) {
                Toast.error('Failed to load article');
            }
        }

        window.closeModal = function() {
            document.getElementById('articleModal').style.display = 'none';
            document.body.style.overflow = '';
            currentArticleId = null;
        }

        window.submitVote = async function(helpful) {
            if (!currentArticleId) return;
            try {
                await API.post(`/knowledge/${currentArticleId}/vote?helpful=${helpful}`);
                Toast.success('Thanks for your feedback!');
                
                // Update local counts visually
                if (helpful) {
                    const el = document.getElementById('modalHelpful');
                    el.textContent = parseInt(el.textContent) + 1;
                } else {
                    const el = document.getElementById('modalNotHelpful');
                    el.textContent = parseInt(el.textContent) + 1;
                }
            } catch (error) {
                Toast.error('Failed to submit feedback');
            }
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('articleModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        initKB();
    </script>
</body>

</html>
