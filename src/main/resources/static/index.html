<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Helpdesk</title>
    <meta name="description" content="Login to the Multi-Department Helpdesk Ticketing System">
    <link rel="stylesheet" href="/css/style.css">
    <!-- Google Fonts for the new design -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- No GIS script needed for popup OAuth2 flow -->
</head>

<body>
    <div class="auth-split-layout">

        <!-- Left Side: Vibrant Animated Panel -->
        <div class="auth-right animated-panel">
            <div class="anim-shape shape-1"></div>
            <div class="anim-shape shape-2"></div>
            <div class="anim-shape shape-3"></div>
            <div class="anim-shape shape-4"></div>
            <div class="anim-shape shape-5"></div>
            <div class="anim-shape shape-6"></div>
            <div class="anim-ring ring-1"></div>
            <div class="anim-ring ring-2"></div>
            <div class="login-grid"></div>
            <div style="position:relative; z-index:2; text-align:center; padding:40px;">
                <div class="login-icon-ring">
                    <div class="login-icon-inner">🎫</div>
                </div>
                <h2 style="color:#fff; font-size:2.8rem; font-weight:800; margin-bottom:16px; line-height:1.2;">
                    Welcome<br>to HelpDesk
                </h2>
                <p
                    style="color:rgba(255,255,255,0.6); font-size:1.1rem; max-width:300px; margin:0 auto 30px; line-height:1.6;">
                    Your all-in-one support platform for managing tickets, tracking issues, and delivering great
                    service.
                </p>
                <div class="login-features">
                    <div class="login-feature-pill">🚀 Fast Resolution</div>
                    <div class="login-feature-pill">📊 Real-time Tracking</div>
                    <div class="login-feature-pill">🤖 AI Assistant</div>
                </div>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="auth-left">
            <div class="auth-content">
                <div class="brand-logo">
                    <div class="logo-circle"></div>
                    <span>HelpDesk</span>
                </div>

                <div class="auth-header-new">
                    <h1>Hello!</h1>
                    <p>Sign in to your account</p>
                </div>

                <!-- Tab Switcher (Visual only for now, can be functional if needed) -->
                <div class="auth-tabs">
                    <button class="auth-tab active">Sign In</button>
                    <a href="/register" class="auth-tab">Sign Up</a>
                </div>

                <form id="loginForm" class="modern-form">
                    <div class="form-group-new">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="email@mail.com" required>
                    </div>
                    <div class="form-group-new">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Your password" required>
                    </div>

                    <div class="form-options">
                        <label class="custom-checkbox">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-new btn-primary-new" id="loginBtn">Login</button>
                </form>

                <div class="divider">
                    <span>OR</span>
                </div>

                <!-- Google Sign-In -->
                <button type="button" class="google-signin-btn" id="customGoogleBtn">
                    <svg width="20" height="20" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                    </svg>
                    Continue with Google
                </button>

                <div class="mobile-footer">
                    Don't have an account? <a href="/register">Sign Up here</a>
                </div>
            </div>
        </div>

    </div>

    <script src="/js/app.js"></script>
    <script src="/js/chatbot.js"></script>
    <script>
        // Redirect if already logged in
        if (Auth.isLoggedIn()) {
            window.location.href = '/dashboard';
        }

        // --- Normal email/password login ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const originalText = btn.textContent;
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            try {
                const data = await API.post('/auth/login', {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });

                Auth.setAuth(data);
                Toast.success('Welcome back, ' + data.fullName + '!');
                setTimeout(() => window.location.href = '/dashboard', 800);
            } catch (error) {
                Toast.error(error.message || 'Invalid email or password');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // --- Google Sign-In (Popup OAuth2 Flow) ---
        const GOOGLE_CLIENT_ID = '140949296868-euuvilv1i88lfd8o2so3dmajj9k065k3.apps.googleusercontent.com';
        const REDIRECT_URI = window.location.origin + '/oauth2callback.html';

        function openGoogleSignIn() {
            const params = new URLSearchParams({
                client_id: GOOGLE_CLIENT_ID,
                redirect_uri: REDIRECT_URI,
                response_type: 'id_token',
                scope: 'openid email profile',
                nonce: Math.random().toString(36).substring(2)
            });
            const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
            const popup = window.open(authUrl, 'GoogleSignIn', 'width=500,height=600,scrollbars=yes,resizable=yes');
            if (!popup) {
                Toast.error('Popup blocked! Please allow popups for this site and try again.');
            }
        }

        // Listen for the token posted back from oauth2callback.html
        window.addEventListener('message', async (event) => {
            if (event.origin !== window.location.origin) return;
            if (!event.data || event.data.type !== 'GOOGLE_AUTH') return;

            const credential = event.data.credential;
            if (!credential) {
                Toast.error('Google sign-in failed: no credential received.');
                return;
            }

            try {
                const data = await API.post('/auth/google', { credential });
                Auth.setAuth(data);
                Toast.success('Welcome, ' + data.fullName + '!');
                setTimeout(() => window.location.href = '/dashboard', 800);
            } catch (error) {
                Toast.error(error.message || 'Google sign-in failed');
            }
        });

        document.getElementById('customGoogleBtn').addEventListener('click', openGoogleSignIn);
    </script>
</body>

</html>
