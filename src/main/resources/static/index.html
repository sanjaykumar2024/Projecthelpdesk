<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Helpdesk</title>
    <meta name="description" content="Login to the Multi-Department Helpdesk Ticketing System">
    <link rel="stylesheet" href="/css/style.css">
    <!-- Google Fonts for the new design -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div class="auth-split-layout">
        <!-- Left Side: Login Form -->
        <div class="auth-left">
            <div class="auth-content">
                <div class="brand-logo">
                    <div class="logo-circle"></div>
                    <span>HelpDesk</span>
                </div>

                <div class="auth-header-new">
                    <h1>Hello!</h1>
                    <p>Sign in to your account</p>
                </div>

                <!-- Tab Switcher (Visual only for now, can be functional if needed) -->
                <div class="auth-tabs">
                    <button class="auth-tab active">Sign In</button>
                    <a href="/register.html" class="auth-tab">Sign Up</a>
                </div>

                <form id="loginForm" class="modern-form">
                    <div class="form-group-new">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="email@mail.com" required>
                    </div>
                    <div class="form-group-new">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Your password" required>
                    </div>

                    <div class="form-options">
                        <label class="custom-checkbox">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-new btn-primary-new" id="loginBtn">Login</button>
                </form>

                <div class="divider">
                    <span>OR</span>
                </div>

                <div class="social-login">
                    <div id="googleSignInBtn" style="display:flex;justify-content:center;"></div>
                </div>

                <div class="mobile-footer">
                    Don't have an account? <a href="/register.html">Sign Up here</a>
                </div>
            </div>
        </div>

        <!-- Right Side: Abstract Image -->
        <div class="auth-right"
            style="background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 40%, #312E81 70%, #1E1B4B 100%); position:relative; overflow:hidden;">
            <!-- Animated floating orbs -->
            <div class="login-orb orb-1"></div>
            <div class="login-orb orb-2"></div>
            <div class="login-orb orb-3"></div>
            <div class="login-orb orb-4"></div>

            <!-- Animated grid lines -->
            <div class="login-grid"></div>

            <!-- Content overlay -->
            <div style="position:relative; z-index:2; text-align:center; padding:40px;">
                <div class="login-icon-ring">
                    <div class="login-icon-inner">🎫</div>
                </div>
                <h2 style="color:#fff; font-size:2.8rem; font-weight:800; margin-bottom:16px; line-height:1.2;">
                    Welcome<br>to HelpDesk
                </h2>
                <p
                    style="color:rgba(255,255,255,0.6); font-size:1.1rem; max-width:300px; margin:0 auto 30px; line-height:1.6;">
                    Your all-in-one support platform for managing tickets, tracking issues, and delivering great
                    service.
                </p>
                <div class="login-features">
                    <div class="login-feature-pill">🚀 Fast Resolution</div>
                    <div class="login-feature-pill">📊 Real-time Tracking</div>
                    <div class="login-feature-pill">🤖 AI Assistant</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/chatbot.js"></script>
    <script>
        // Redirect if already logged in
        if (Auth.isLoggedIn()) {
            window.location.href = '/dashboard.html';
        }

        // --- Normal email/password login ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const originalText = btn.textContent;
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            try {
                const data = await API.post('/auth/login', {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });

                Auth.setAuth(data);
                Toast.success('Welcome back, ' + data.fullName + '!');
                setTimeout(() => window.location.href = '/dashboard.html', 800);
            } catch (error) {
                Toast.error(error.message || 'Invalid email or password');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // --- Google Sign-In callback ---
        async function handleGoogleCredential(response) {
            try {
                const data = await API.post('/auth/google', {
                    credential: response.credential
                });

                Auth.setAuth(data);
                Toast.success('Welcome, ' + data.fullName + '!');
                setTimeout(() => window.location.href = '/dashboard.html', 800);
            } catch (error) {
                Toast.error(error.message || 'Google sign-in failed');
            }
        }

        // --- Initialize Google Sign-In button ---
        window.addEventListener('load', () => {
            if (typeof google !== 'undefined' && google.accounts) {
                google.accounts.id.initialize({
                    client_id: '140949296868-euuvilv1i88lfd8o2so3dmajj9k065k3.apps.googleusercontent.com',
                    callback: handleGoogleCredential
                });
                google.accounts.id.renderButton(
                    document.getElementById('googleSignInBtn'),
                    {
                        theme: 'outline',
                        size: 'large',
                        width: 320,
                        text: 'signin_with',
                        shape: 'rectangular'
                    }
                );
            }
        });
    </script>
</body>

</html>
