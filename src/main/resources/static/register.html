<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Helpdesk</title>
    <meta name="description" content="Create an account on the Multi-Department Helpdesk Ticketing System">
    <link rel="stylesheet" href="/css/style.css">
    <!-- Google Fonts for the new design -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="auth-split-layout">
        <!-- Left Side: Register Form -->
        <div class="auth-left">
            <div class="auth-content">
                <div class="brand-logo">
                    <div class="logo-circle"></div>
                    <span>HelpDesk</span>
                </div>

                <div class="auth-header-new">
                    <h1>Join Us!</h1>
                    <p>Create your account to get started</p>
                </div>

                <!-- Tab Switcher -->
                <div class="auth-tabs">
                    <a href="/index.html" class="auth-tab">Sign In</a>
                    <button class="auth-tab active">Sign Up</button>
                </div>

                <!-- Step 1: Registration Form -->
                <form id="registerForm" class="modern-form">
                    <div class="form-group-new">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="John Doe" required>
                    </div>

                    <div class="form-group-new">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="email@mail.com" required>
                    </div>

                    <div class="form-group-new">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                    </div>

                    <button type="submit" class="btn-new btn-primary-new" id="registerBtn">Create Account</button>
                </form>

                <!-- Step 2: OTP Form (Hidden by default) -->
                <form id="otpForm" class="modern-form" style="display: none;">
                    <div class="auth-header-new">
                        <h3>Verify Email</h3>
                        <p>Enter the 6-digit code sent to your email.</p>
                    </div>

                    <div class="form-group-new">
                        <label>OTP Code</label>
                        <input type="text" id="otpInput" placeholder="123456" required maxlength="6"
                            style="letter-spacing: 4px; text-align: center; font-size: 1.2rem;">
                    </div>

                    <button type="submit" class="btn-new btn-primary-new" id="otpBtn">Verify & Login</button>
                    <div style="text-align: center; margin-top: 15px;">
                        <a href="#" onclick="location.reload()" style="font-size: 0.9rem; color: #666;">Back to
                            Registration</a>
                    </div>
                </form>

                <div class="divider">
                    <span>OR</span>
                </div>

                <div class="social-login">
                    <button class="social-btn">
                        <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" alt="Apple">
                        Apple
                    </button>
                    <button class="social-btn">
                        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google">
                        Google
                    </button>
                </div>

                <div class="mobile-footer">
                    Already have an account? <a href="/index.html">Sign In here</a>
                </div>
            </div>
        </div>

        <!-- Right Side: Abstract Image -->
        <div class="auth-right">
            <div class="hero-image" style="background-image: url('/images/login-bg.png');">
                <div class="hero-overlay">
                    <h2>Start your<br>journey today!</h2>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/chatbot.js"></script>
    <script>
        // Redirect if already logged in
        if (Auth.isLoggedIn()) {
            window.location.href = '/dashboard.html';
        }

        let registeredEmail = '';

        // Step 1: Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const originalText = btn.textContent;
            btn.textContent = 'Sending OTP...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const fullName = document.getElementById('fullName').value;
            const password = document.getElementById('password').value;

            try {
                const data = await API.post('/auth/register', {
                    fullName,
                    email,
                    password
                });

                // Success! But no token yet.
                registeredEmail = email;
                Toast.success('OTP sent to ' + email);

                // Switch to OTP form
                document.getElementById('registerForm').style.display = 'none';
                document.querySelector('.auth-tabs').style.display = 'none'; // Hide tabs
                document.getElementById('otpForm').style.display = 'block';

            } catch (error) {
                Toast.error(error.message || 'Registration failed');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // Step 2: Verify OTP
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('otpBtn');
            const originalText = btn.textContent;
            btn.textContent = 'Verifying...';
            btn.disabled = true;

            const otp = document.getElementById('otpInput').value;

            try {
                const data = await API.post('/auth/verify-otp', {
                    email: registeredEmail,
                    otp: otp
                });

                Auth.setAuth(data);
                Toast.success('Verification successful! Welcome, ' + data.fullName + '!');
                setTimeout(() => window.location.href = '/dashboard.html', 800);
            } catch (error) {
                Toast.error(error.message || 'Invalid OTP');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
