<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Ticket | Helpdesk</title>
    <meta name="description" content="Create a new support ticket">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="page-loader">
        <div class="loader-spinner"></div>
    </div>
    <!-- TOP NAVIGATION -->
    <nav class="top-nav">
        <div class="nav-container">
            <a href="dashboard.html" class="nav-logo">🎫 HelpDesk</a>

            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="tickets.html" class="nav-link">My Tickets</a>
                <a href="create-ticket.html" class="nav-link active">New Ticket</a>
                <a href="tickets.html?view=all" class="nav-link" data-role="ADMIN" style="display:none">All Tickets</a>
                <a href="dashboard.html?view=admin" class="nav-link" data-role="ADMIN" style="display:none">Manage
                    Agents</a>
            </div>

            <div class="nav-actions">
                <button class="theme-toggle" onclick="ThemeManager.toggle()" title="Toggle dark mode"></button>
                <div class="nav-user">
                    <div class="nav-avatar">U</div>
                    <button onclick="Auth.logout()" class="btn btn-sm btn-outline"
                        style="border:none;color:var(--text-muted)">Log Out</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="app-layout" style="display:block">
        <main class="main-content"
            style="display:flex;flex-direction:column;min-height:100vh;margin-left:0;padding-top:20px;max-width:1200px;margin:0 auto">
            <div class="mb-3">
                <h1>➕ Create Ticket</h1>
            </div>

            <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:20px;">
                <div class="glass-card"
                    style="width:100%;max-width:600px;animation:modalPopIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); margin:0 auto">
                    <form id="createTicketForm">
                        <div class="form-group">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" id="title" placeholder="Brief summary of your issue"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="description"
                                placeholder="Provide detailed information about your issue..." rows="5"
                                required></textarea>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                            <div class="form-group">
                                <label class="form-label">Priority</label>
                                <select class="form-control" id="priority" required>
                                    <option value="">Select priority</option>
                                    <option value="LOW">🟢 Low</option>
                                    <option value="MEDIUM">🔵 Medium</option>
                                    <option value="HIGH">🟡 High</option>
                                    <option value="URGENT">🔴 Urgent</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Department</label>
                                <select class="form-control" id="departmentId" required>
                                    <option value="">Select department</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn" style="width:100%">
                            🎫 Submit Ticket
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/chatbot.js"></script>
    <script>
        if (!Auth.requireAuth()) throw new Error('Not authenticated');

        async function loadDepartments() {
            try {
                const depts = await API.get('/departments');
                const select = document.getElementById('departmentId');
                depts.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = d.name;
                    select.appendChild(opt);
                });
            } catch (e) {
                Toast.warning('No departments found. Ask admin to create one first.');
            }
        }

        document.getElementById('createTicketForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.textContent = '⏳ Submitting...';
            btn.disabled = true;

            try {
                const ticket = await API.post('/tickets', {
                    title: document.getElementById('title').value,
                    description: document.getElementById('description').value,
                    priority: document.getElementById('priority').value,
                    departmentId: parseInt(document.getElementById('departmentId').value)
                });

                Toast.success('Ticket #' + ticket.id + ' created successfully!');
                setTimeout(() => window.location.href = 'ticket-detail.html?id=' + ticket.id, 1000);
            } catch (error) {
                Toast.error(error.message || 'Failed to create ticket');
                btn.textContent = '🎫 Submit Ticket';
                btn.disabled = false;
            }
        });

        loadDepartments();
    </script>
</body>

</html>
